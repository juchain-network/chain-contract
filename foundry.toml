[profile.default]
solc_version = "0.8.20"
src = "contracts"
test = "test"
out = "out"
libs = ["lib", "node_modules"]
optimizer = true
optimizer_runs = 200

# Gas 
gas_limit = 9223372036854775807
gas_price = 1000000000  # 1 gwei
gas_reports = ["*"]

remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
]

# RPC
[rpc_endpoints]
local = "http://localhost:8545"

[fmt]
line_length = 120
multiline_func_header = "attributes_first"
